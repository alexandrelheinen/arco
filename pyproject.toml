[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arco"
version = "0.1.0"
description = "Autonomous Routing, Control, and Observation algorithms in Python."
authors = [
    { name = "Alexandre Heinen" }
]
requires-python = ">=3.10"
dependencies = [
    "numpy"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "black",
    "isort",
    "matplotlib"
]

[tool.setuptools.packages.find]
where = ["src"]
