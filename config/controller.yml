# Example configuration for guidance controllers
controller:
  type: pure_pursuit  # Options: pure_pursuit, pid, mpc
  lookahead_distance: 2.0
  pid:
    kp: 1.0
    ki: 0.0
    kd: 0.1
  mpc:
    horizon: 10
    dt: 0.1
vehicle:
  max_speed: 5.0       # m/s
  min_speed: 0.0       # m/s  (0 = no reversing)
  max_turn_rate: 1.0   # rad/s
  max_acceleration: 2.0     # m/s²
  max_turn_rate_dot: 2.0    # rad/s²
tracking:
  cruise_speed: 1.0    # m/s
  dt: 0.1              # s
