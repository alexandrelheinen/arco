name: Release PPP Video

# Generates the ppp.mp4 race video and attaches it to every published
# GitHub release.  The simulation uses PyOpenGL rendered inside an
# Xvfb virtual framebuffer so no physical display is required.

on:
  release:
    types:
      - published

jobs:
  generate-ppp-video:
    name: Generate and upload PPP race video
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            libgl1 \
            libglib2.0-0

      - name: Install package and simulator dependencies
        run: |
          pip install -e ".[dev,tools,pygame]"

      - name: Generate PPP race video
        run: |
          bash scripts/generate_videos.sh \
            --only ppp \
            --out-dir /tmp \
            --duration 90
          mv /tmp/arcosim_ppp.mp4 /tmp/ppp.mp4

      - name: Upload ppp.mp4 to release
        run: |
          gh release upload "${{ github.ref_name }}" /tmp/ppp.mp4 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
