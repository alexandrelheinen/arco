name: Code Formatting

on:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Code formatting validation job.
  # Validates that code follows black and isort formatting standards.
  # Also checks for Google-style docstrings using pydocstyle.
  # On pull requests this job is intended to be set as a required status
  # check (Settings → Branches → Branch protection rules → "Require status
  # checks to pass before merging" → add "formatting / Check code formatting").
  # -----------------------------------------------------------------------
  formatting:
    name: Check code formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatting tools
        run: pip install black isort pydocstyle

      - name: Check black formatting
        id: black
        run: |
          echo "Checking black formatting (line-length: 79)..."
          python -m black --check --target-version py312 --line-length 79 src/ tests/ tools/
        continue-on-error: true

      - name: Check isort formatting
        id: isort
        run: |
          echo "Checking isort formatting..."
          python -m isort --check-only --line-length 79 src/ tests/ tools/
        continue-on-error: true

      - name: Check Google-style docstrings
        id: pydocstyle
        run: |
          echo "Checking Google-style docstrings..."
          python -m pydocstyle --convention=google --add-ignore=D100,D104,D205,D212,D402,D411 src/
        continue-on-error: true

      - name: Evaluate results
        run: |
          BLACK_EXIT=${{ steps.black.outcome }}
          ISORT_EXIT=${{ steps.isort.outcome }}
          PYDOCSTYLE_EXIT=${{ steps.pydocstyle.outcome }}

          echo "=== Formatting Check Results ==="
          echo "Black: $BLACK_EXIT"
          echo "isort: $ISORT_EXIT"
          echo "Pydocstyle: $PYDOCSTYLE_EXIT"
          echo "================================"

          # Black: fail if it fails, warn if it has concerns
          if [ "$BLACK_EXIT" = "failure" ]; then
            echo "❌ Black formatting check failed"
            exit 1
          elif [ "$BLACK_EXIT" = "success" ]; then
            echo "✅ Black formatting is valid"
          fi

          # isort: must not raise anything
          if [ "$ISORT_EXIT" = "failure" ]; then
            echo "❌ isort formatting check failed"
            exit 1
          else
            echo "✅ isort formatting is valid"
          fi

          # Pydocstyle: warning only for now
          if [ "$PYDOCSTYLE_EXIT" = "failure" ]; then
            echo "⚠️  Google-style docstring check has warnings (not blocking)"
          else
            echo "✅ Google-style docstrings are valid"
          fi

  # -----------------------------------------------------------------------
  # Notify on broken main.
  # Only runs when the formatting job fails on a push to main (not on PRs).
  # -----------------------------------------------------------------------
  notify-broken-main:
    name: Notify broken main
    needs: formatting
    if: >
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Open issue for broken main
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Formatting failing on \`main\` (${context.sha.slice(0, 7)})`,
              body: [
                '## Broken main branch detected',
                '',
                `The code formatting workflow failed on a push to \`main\`.`,
                '',
                `**Commit:** ${context.sha}`,
                `**Run:** ${runUrl}`,
                '',
                'Please fix the formatting issues and push a follow-up commit.',
                '',
                'To fix formatting issues, run:',
                '```bash',
                'python -m black --target-version py312 --line-length 79 src/ tests/ tools/',
                'python -m isort --line-length 79 src/ tests/ tools/',
                '```',
              ].join('\n'),
              labels: ['bug', 'ci'],
            });
