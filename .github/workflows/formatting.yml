name: Code Formatting

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

jobs:
  # -----------------------------------------------------------------------
  # Code formatting validation job.
  # Validates that code follows black and isort formatting standards.
  # Also checks for Google-style docstrings using pydocstyle.
  # On pull requests this job is intended to be set as a required status
  # check (Settings → Branches → Branch protection rules → "Require status
  # checks to pass before merging" → add "formatting / Check code formatting").
  # -----------------------------------------------------------------------
  formatting:
    name: Check code formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatting tools
        run: pip install black isort pydocstyle

      - name: Run formatting checks
        run: bash scripts/check_formatting.sh

  # -----------------------------------------------------------------------
  # Notify on broken main.
  # Only runs when the formatting job fails on a push to main (not on PRs).
  # -----------------------------------------------------------------------
  notify-broken-main:
    name: Notify broken main
    needs: formatting
    if: >
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Open issue for broken main
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Formatting failing on \`main\` (${context.sha.slice(0, 7)})`,
              body: [
                '## Broken main branch detected',
                '',
                `The code formatting workflow failed on a push to \`main\`.`,
                '',
                `**Commit:** ${context.sha}`,
                `**Run:** ${runUrl}`,
                '',
                'Please fix the formatting issues and push a follow-up commit.',
                '',
                'To fix formatting issues, run:',
                '```bash',
                'python -m black --target-version py312 --line-length 79 src/',
                'python -m isort --line-length 79 src/',
                '```',
              ].join('\n'),
              labels: ['bug', 'ci'],
            });
