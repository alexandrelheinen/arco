name: Pyreverse

on:
  push:
    branches:
      - main
    paths:
      - "src/arco/**"
      - ".github/workflows/pyreverse.yml"

jobs:
  pyreverse:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pyreverse
        run: |
          pyreverse --verbose -f PUB_ONLY --colorized -d ./docs/pyreverse/ -o html -k -m y --no-standalone ./src/arco/

      - name: Commit updated diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pyreverse/
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "docs: update pyreverse diagrams [skip ci]" && git push)
