name: A* Visualization Examples

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  astar-examples:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Generate A* graph example image
        run: |
          mkdir -p /tmp/astar_images
          MPLBACKEND=Agg python tools/astar_graph_example.py \
            --save /tmp/astar_images/astar_graph.png

      - name: Generate A* grid obstacle example (Euclidean grid)
        run: |
          MPLBACKEND=Agg python tools/astar_grid_obstacle_example.py \
            --save /tmp/astar_images/astar_grid_obstacle_euclidean.png

      - name: Generate A* grid obstacle example (Manhattan grid)
        run: |
          MPLBACKEND=Agg python tools/astar_manhattan_example.py \
            --save /tmp/astar_images/astar_grid_obstacle_manhattan.png

      - name: Upload example images as artifacts
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: astar-example-images
          path: /tmp/astar_images/
          retention-days: 30

      - name: Post PR comment with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.upload-artifact.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## 🗺️ A\\* Visualization Examples',
              '',
              'The following plots were generated for this PR.  ' +
              'Download the artifact bundle to view the images.',
              '',
              `📦 **[Download images](${artifactUrl})**`,
              '',
              '| Example | Description |',
              '|---------|-------------|',
              '| `astar_graph.png` | A\\* on a randomly generated 2-D weighted graph |',
              '| `astar_grid_obstacle_euclidean.png` | A\\* on a Euclidean (8-conn.) grid — diagonal path around obstacle |',
              '| `astar_grid_obstacle_manhattan.png` | A\\* on a Manhattan (4-conn.) grid — staircase path around obstacle |',
              '',
              `_Generated by [workflow run](${runUrl})_`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
