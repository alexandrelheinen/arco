name: Release RR Video

# Generates the rr.mp4 arm simulation video and attaches it to every
# published GitHub release.  The simulation uses PyOpenGL rendered inside
# an Xvfb virtual framebuffer so no physical display is required.

on:
  release:
    types:
      - published

jobs:
  generate-rr-video:
    name: Generate and upload RR arm simulation video
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            libgl1 \
            libglib2.0-0

      - name: Install package and simulator dependencies
        run: |
          pip install -e ".[dev,tools,pygame]"

      - name: Generate RR arm simulation video
        run: |
          cd src/arco/tools/simulator
          export SDL_AUDIODRIVER=dummy
          xvfb-run -a python main/rr.py \
            --record /tmp/rr.mp4 \
            --record-duration 90

      - name: Upload rr.mp4 to release
        run: |
          gh release upload "${{ github.ref_name }}" /tmp/rr.mp4 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
