name: Tests

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
