name: Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

jobs:
  # -----------------------------------------------------------------------
  # Main test job.
  # On pull requests this job is intended to be set as a required status
  # check (Settings → Branches → Branch protection rules → "Require status
  # checks to pass before merging" → add "test / Run unit tests").
  # -----------------------------------------------------------------------
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: bash scripts/run_tests.sh

  # -----------------------------------------------------------------------
  # Notify on broken main.
  # Only runs when the test job fails on a push to main (not on PRs).
  # GitHub automatically emails repository watchers / the committer when a
  # workflow run fails.  This job additionally opens a GitHub Issue so that
  # the failure is visible in the Issues tab and triggers email
  # notifications for anyone subscribed to issue activity.
  # -----------------------------------------------------------------------
  notify-broken-main:
    name: Notify broken main
    needs: test
    if: >
      failure() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Open issue for broken main
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Tests failing on \`main\` (${context.sha.slice(0, 7)})`,
              body: [
                '## Broken main branch detected',
                '',
                `The unit-test workflow failed on a push to \`main\`.`,
                '',
                `**Commit:** ${context.sha}`,
                `**Run:** ${runUrl}`,
                '',
                'Please fix the issue and push a follow-up commit.',
              ].join('\n'),
              labels: ['bug', 'ci'],
            });
