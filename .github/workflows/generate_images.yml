name: Generate Images

# Each example scenario is generated by its own parallel job for faster
# feedback and finer-grained failure isolation.  Pyreverse class and package
# diagrams are generated in a dedicated job.  A final report job zips all
# images into a single downloadable bundle and posts a PR comment.

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  # -----------------------------------------------------------------------
  # One parallel job per scenario.
  # -----------------------------------------------------------------------
  generate-example:
    name: Generate ${{ matrix.scenario }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scenario: [astar, ppp, rr, city, vehicle, rrp, occ]
      fail-fast: false

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev,tools,pygame]"

      - name: Generate example image
        run: |
          bash scripts/run_example.sh ${{ matrix.scenario }} \
            --save-dir /tmp/generated_images

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.scenario }}
          path: /tmp/generated_images/arcoex_${{ matrix.scenario }}.png

  # -----------------------------------------------------------------------
  # Generate graphviz package and scoped class diagrams.
  # -----------------------------------------------------------------------
  generate-diagrams:
    name: Generate graphviz diagrams
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Graphviz CLI
        run: sudo apt-get install -y graphviz

      - name: Install package with dev dependencies
        run: pip install -e ".[dev,tools,pygame]"

      - name: Fetch origin/main for diff
        run: git fetch origin main:refs/remotes/origin/main || true

      - name: Generate diagrams
        run: bash scripts/generate_diagrams.sh --out-dir /tmp/generated_diagrams

      - name: Upload diagram artifacts
        uses: actions/upload-artifact@v4
        with:
          name: images-diagrams
          path: /tmp/generated_diagrams/

  # -----------------------------------------------------------------------
  # Collect all per-job images, zip them into a single bundle, upload the
  # bundle as an artifact, and post a PR comment with the download link.
  # Runs even when some image jobs fail so partial results are still reported.
  # -----------------------------------------------------------------------
  report:
    name: Zip images and post PR comment
    needs: [generate-example, generate-diagrams]
    if: always()
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download example image artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: /tmp/generated_images
          pattern: image-*
          merge-multiple: true

      - name: Download diagram artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: images-diagrams
          path: /tmp/generated_images

      - name: Create image bundle
        run: bash scripts/zip_images.sh /tmp/generated_images /tmp/generated_images.zip

      - name: Upload image bundle
        id: bundle
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: /tmp/generated_images.zip
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACT_URL: ${{ steps.bundle.outputs.artifact-url }}
        run: bash scripts/post_images_report.sh
