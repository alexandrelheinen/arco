name: Generate Images

on:
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  generate-images:
    name: Generate algorithm examples and diagrams
    runs-on: ubuntu-latest

    # Only read access: untrusted PR code is executed here, so no write
    # permissions are granted to this job.
    permissions:
      contents: read

    outputs:
      artifact-url: ${{ steps.upload-artifact.outputs.artifact-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Graphviz (for pyreverse)
        run: sudo apt-get install -y graphviz

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Create output directory
        run: mkdir -p /tmp/generated_images

      # Generate A* example images
      - name: Generate A* graph example
        run: |
          MPLBACKEND=Agg python tools/examples/astar_graph.py \
            --save /tmp/generated_images/astar_graph.png

      - name: Generate A* Euclidean grid example
        run: |
          MPLBACKEND=Agg python tools/examples/astar_grid_obstacle.py \
            --save /tmp/generated_images/astar_grid_obstacle_euclidean.png

      - name: Generate A* Manhattan grid example
        run: |
          MPLBACKEND=Agg python tools/examples/astar_manhattan.py \
            --save /tmp/generated_images/astar_grid_obstacle_manhattan.png

      # Generate Phase 1 pipeline example
      - name: Generate Phase 1 pipeline example
        run: |
          MPLBACKEND=Agg python tools/examples/phase1_pipeline.py \
            --save /tmp/generated_images/phase1_pipeline.png

      # Generate pyreverse diagrams
      - name: Generate pyreverse class diagram
        run: |
          pyreverse --verbose -f PUB_ONLY --colorized -o png -k -m y --no-standalone \
            -p classes ./src/arco/
          mv classes_classes.png /tmp/generated_images/pyreverse_classes.png

      - name: Generate pyreverse package diagram
        run: |
          pyreverse --verbose -f PUB_ONLY --colorized -o png -k -m y --no-standalone \
            -p packages ./src/arco/
          mv packages_packages.png /tmp/generated_images/pyreverse_packages.png

      # Upload all images as a single artifact
      - name: Upload generated images
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: /tmp/generated_images/
          retention-days: 30

  # -----------------------------------------------------------------------
  # Post PR comment with artifact download link.
  # Separated from the generation job so that untrusted PR code is never
  # executed with write permissions.
  # -----------------------------------------------------------------------
  post-comment:
    name: Post PR comment with artifact link
    needs: generate-images
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Post PR comment with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ needs.generate-images.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## 📊 Generated Images',
              '',
              'Algorithm examples and architecture diagrams have been generated for this PR.',
              '',
              `📦 **[Download all images](${artifactUrl})**`,
              '',
              '### A\\* Visualization Examples',
              '',
              '| Image | Description |',
              '|-------|-------------|',
              '| `astar_graph.png` | A\\* on a randomly generated 2D weighted graph |',
              '| `astar_grid_obstacle_euclidean.png` | A\\* on Euclidean (8-connected) grid with diagonal paths |',
              '| `astar_grid_obstacle_manhattan.png` | A\\* on Manhattan (4-connected) grid with staircase paths |',
              '',
              '### Phase 1 Pipeline',
              '',
              '| Image | Description |',
              '|-------|-------------|',
              '| `phase1_pipeline.png` | End-to-end: road network → route planning → path tracking simulation |',
              '',
              '### Architecture Diagrams (Pyreverse)',
              '',
              '| Image | Description |',
              '|-------|-------------|',
              '| `pyreverse_classes.png` | Class diagram showing inheritance and relationships |',
              '| `pyreverse_packages.png` | Package structure and dependencies |',
              '',
              `_Generated by [workflow run](${runUrl})_`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
