name: Generate Images

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  generate-images:
    name: Generate scenario examples and diagrams
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Graphviz (for pyreverse)
        run: sudo apt-get install -y graphviz

      - name: Install package with dev dependencies
        run: pip install -e ".[dev,tools,pygame]"

      - name: Create output directory
        run: mkdir -p /tmp/generated_images

      # Generate the 5 scenario example images
      - name: Generate A* example
        run: |
          MPLBACKEND=Agg python tools/examples/astar.py \
            --save /tmp/generated_images/example_astar.png

      - name: Generate PPP example
        run: |
          MPLBACKEND=Agg python tools/examples/ppp.py \
            --save /tmp/generated_images/example_ppp.png

      - name: Generate RR example
        run: |
          MPLBACKEND=Agg python tools/examples/rr.py \
            --save /tmp/generated_images/example_rr.png

      - name: Generate city example
        run: |
          MPLBACKEND=Agg python tools/examples/city.py \
            --save /tmp/generated_images/example_city.png

      - name: Generate vehicle benchmark example
        run: |
          MPLBACKEND=Agg python tools/examples/vehicle.py \
            --save /tmp/generated_images/example_vehicle.png

      - name: Generate RRP SCARA example
        run: |
          MPLBACKEND=Agg python tools/examples/rrp.py \
            --save /tmp/generated_images/example_rrp.png

      # Generate pyreverse diagrams
      - name: Generate pyreverse class diagram
        run: |
          pyreverse --verbose -f PUB_ONLY --colorized -o png -k --no-standalone \
            -p classes ./src/arco/
          mv classes_classes.png /tmp/generated_images/pyreverse_classes.png

      - name: Generate pyreverse package diagram
        run: |
          pyreverse --verbose -f PUB_ONLY --colorized -o png -k --no-standalone \
            -p packages ./src/arco/
          mv packages_packages.png /tmp/generated_images/pyreverse_packages.png

      # Upload all images as a single artifact
      - name: Upload generated images
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: /tmp/generated_images/
          retention-days: 30

      # Post PR comment with download link
      - name: Post PR comment with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.upload-artifact.outputs.artifact-url }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## 📊 Generated Images',
              '',
              'Scenario examples and architecture diagrams have been generated for this PR.',
              '',
              `📦 **[Download all images](${artifactUrl})**`,
              '',
              '| Group | Image | Description |',
              '|-------|-------|-------------|',
              '| Example | `example_astar.png` | A* graph scenario (2-D) |',
              '| Example | `example_ppp.png` | PPP warehouse scenario (3-D) |',
              '| Example | `example_rr.png` | RR arm scenario (2-D) |',
              '| Example | `example_city.png` | City race scenario (2-D) |',
              '| Example | `example_vehicle.png` | Vehicle benchmark scenario (2-D, RRT* vs SST) |',
              '| Example | `example_rrp.png` | RRP SCARA arm scenario (3-D) |',
              '| Pyreverse | `pyreverse_classes.png` | Class diagram showing inheritance and relationships |',
              '| Pyreverse | `pyreverse_packages.png` | Package structure and dependencies |',
              '',
              `_Generated by [workflow run](${runUrl})_`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
