name: Release Videos

on:
  release:
    types:
      - published

jobs:
  generate-videos:
    name: Generate and attach simulation MP4s
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg and virtual display
        run: sudo apt-get install -y ffmpeg xvfb libgl1

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Create output directory
        run: mkdir -p /tmp/sim_videos

      - name: Generate racing chiptune (CC0)
        run: |
          python -m arco.tools.simulator.generate_chiptune \
            --output /tmp/sim_videos/racing_theme.wav

      - name: Generate A* general view (full network camera)
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.astar \
            --fps 30 \
            --camera full \
            --record /tmp/sim_videos/astar_full.mp4 \
            --record-duration 60

      - name: Generate A* zoomed view (follow-vehicle camera)
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.astar \
            --fps 30 \
            --camera follow \
            --record /tmp/sim_videos/astar_zoom.mp4 \
            --record-duration 60

      - name: Generate RRT* planning visualisation
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.rrt \
            --fps 30 \
            --record /tmp/sim_videos/rrt_full.mp4 \
            --record-duration 60

      - name: Generate RRT* zoomed visualisation
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.rrt \
            --fps 30 \
            --zoom \
            --camera follow \
            --record /tmp/sim_videos/rrt_zoom.mp4 \
            --record-duration 60

      - name: Generate SST planning visualisation
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.sst \
            --fps 30 \
            --record /tmp/sim_videos/sst_full.mp4 \
            --record-duration 60

      - name: Generate SST zoomed visualisation
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.sst \
            --fps 30 \
            --zoom \
            --camera follow \
            --record /tmp/sim_videos/sst_zoom.mp4 \
            --record-duration 60

      - name: Generate RRT* vs SST cul-de-sac race
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.sparse \
            --fps 30 \
            --record /tmp/sim_videos/sparse.mp4 \
            --record-duration 90

      - name: Mix racing chiptune into all videos
        run: |
          AUDIO=/tmp/sim_videos/racing_theme.wav
          for VIDEO in \
            astar_full \
            astar_zoom \
            rrt_full \
            rrt_zoom \
            sst_full \
            sst_zoom \
            sparse; do
            SRC=/tmp/sim_videos/${VIDEO}.mp4
            TMP=/tmp/sim_videos/${VIDEO}_audio.mp4
            ffmpeg -y \
              -i "$SRC" \
              -stream_loop -1 -i "$AUDIO" \
              -shortest \
              -map 0:v -map 1:a \
              -c:v copy -c:a aac -b:a 128k \
              "$TMP"
            mv "$TMP" "$SRC"
          done

      - name: Upload A* full view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/astar_full.mp4 \
            --clobber

      - name: Upload A* zoomed view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/astar_zoom.mp4 \
            --clobber

      - name: Upload RRT* full view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/rrt_full.mp4 \
            --clobber

      - name: Upload RRT* zoomed view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/rrt_zoom.mp4 \
            --clobber

      - name: Upload SST full view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/sst_full.mp4 \
            --clobber

      - name: Upload SST zoomed view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/sst_zoom.mp4 \
            --clobber

      - name: Upload RRT* vs SST cul-de-sac race to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/sparse.mp4 \
            --clobber
