name: Release Videos

on:
  release:
    types:
      - published

jobs:
  generate-videos:
    name: Generate and attach simulation MP4s
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg and virtual display
        run: sudo apt-get install -y ffmpeg xvfb libgl1

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Create output directory
        run: mkdir -p /tmp/sim_videos

      - name: Generate racing chiptune (CC0)
        run: |
          python tools/simulator/generate_chiptune.py \
            --output /tmp/sim_videos/racing_theme.wav

      - name: Generate A* general view (full network camera)
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python tools/simulator/main/astar.py \
            --fps 30 \
            --record /tmp/sim_videos/astar.mp4 \
            --record-duration 60

      - name: Generate city race video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python tools/simulator/main/city.py \
            --fps 30 \
            --record /tmp/sim_videos/city.mp4 \
            --record-duration 90

      - name: Generate PPP warehouse video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python tools/simulator/main/ppp.py \
            --fps 30 \
            --record /tmp/sim_videos/ppp.mp4 \
            --record-duration 90

      - name: Generate RR arm video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python tools/simulator/main/rr.py \
            --fps 30 \
            --record /tmp/sim_videos/rr.mp4 \
            --record-duration 90

      - name: Generate vehicle benchmark video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python tools/simulator/main/vehicle.py \
            --fps 30 \
            --record /tmp/sim_videos/vehicle.mp4 \
            --record-duration 90

      - name: Mix racing chiptune into all videos
        run: |
          AUDIO=/tmp/sim_videos/racing_theme.wav
          for VIDEO in \
            astar \
            city \
            ppp \
            rr \
            vehicle; do
            SRC=/tmp/sim_videos/${VIDEO}.mp4
            TMP=/tmp/sim_videos/${VIDEO}_audio.mp4
            ffmpeg -y \
              -i "$SRC" \
              -stream_loop -1 -i "$AUDIO" \
              -shortest \
              -map 0:v -map 1:a \
              -c:v copy -c:a aac -b:a 128k \
              "$TMP"
            mv "$TMP" "$SRC"
          done

      - name: Upload A* video to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/astar.mp4 \
            --clobber

      - name: Upload city video to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/city.mp4 \
            --clobber

      - name: Upload PPP video to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/ppp.mp4 \
            --clobber

      - name: Upload RR video to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/rr.mp4 \
            --clobber

      - name: Upload vehicle benchmark video to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/vehicle.mp4 \
            --clobber
