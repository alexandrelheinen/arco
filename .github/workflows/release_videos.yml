name: Release Videos

on:
  release:
    types:
      - created

jobs:
  generate-videos:
    name: Generate and attach simulation MP4s
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Create output directory
        run: mkdir -p /tmp/sim_videos

      - name: Generate general view (full network camera)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python tools/simulator/main.py \
            --fps 30 \
            --camera full \
            --record /tmp/sim_videos/simulation_full.mp4 \
            --record-duration 60

      - name: Generate zoomed view (follow-vehicle camera)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python tools/simulator/main.py \
            --fps 30 \
            --camera follow \
            --record /tmp/sim_videos/simulation_follow.mp4 \
            --record-duration 60

      - name: Upload general view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/simulation_full.mp4 \
            --clobber

      - name: Upload zoomed view to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            /tmp/sim_videos/simulation_follow.mp4 \
            --clobber
