name: Release Videos

on:
  release:
    types:
      - published

jobs:
  generate-videos:
    name: Generate and attach simulation MP4s
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg and virtual display
        run: sudo apt-get install -y ffmpeg xvfb libgl1

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Create output directory
        run: mkdir -p /tmp/sim_videos

      - name: Generate racing chiptune (CC0)
        run: |
          python src/arco/tools/simulator/generate_chiptune.py \
            --output /tmp/sim_videos/racing_theme.wav

      - name: Generate A* simulation video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a arcosim src/arco/tools/config/map/astar.yml \
            --fps 30 \
            --record /tmp/sim_videos/arcosim_astar_${{ github.event.release.tag_name }}.mp4 \
            --record-duration 60

      - name: Generate city race video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a arcosim src/arco/tools/config/map/city.yml \
            --fps 30 \
            --record /tmp/sim_videos/arcosim_city_${{ github.event.release.tag_name }}.mp4 \
            --record-duration 90

      - name: Generate PPP warehouse video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a arcosim src/arco/tools/config/map/ppp.yml \
            --fps 30 \
            --record /tmp/sim_videos/arcosim_ppp_${{ github.event.release.tag_name }}.mp4 \
            --record-duration 90

      - name: Generate RR arm video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a arcosim src/arco/tools/config/map/rr.yml \
            --fps 30 \
            --record /tmp/sim_videos/arcosim_rr_${{ github.event.release.tag_name }}.mp4 \
            --record-duration 90

      - name: Generate vehicle benchmark video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a arcosim src/arco/tools/config/map/vehicle.yml \
            --fps 30 \
            --record /tmp/sim_videos/arcosim_vehicle_${{ github.event.release.tag_name }}.mp4 \
            --record-duration 90

      - name: Generate RRP SCARA arm video
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a arcosim src/arco/tools/config/map/rrp.yml \
            --fps 30 \
            --record /tmp/sim_videos/arcosim_rrp_${{ github.event.release.tag_name }}.mp4 \
            --record-duration 90

      - name: Mix racing chiptune into all videos
        run: |
          AUDIO=/tmp/sim_videos/racing_theme.wav
          TAG="${{ github.event.release.tag_name }}"
          for SCENARIO in astar city ppp rr vehicle rrp; do
            SRC=/tmp/sim_videos/arcosim_${SCENARIO}_${TAG}.mp4
            TMP=/tmp/sim_videos/arcosim_${SCENARIO}_${TAG}_audio.mp4
            ffmpeg -y \
              -i "$SRC" \
              -stream_loop -1 -i "$AUDIO" \
              -shortest \
              -map 0:v -map 1:a \
              -c:v copy -c:a aac -b:a 128k \
              "$TMP"
            mv "$TMP" "$SRC"
          done

      - name: Upload videos to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for SCENARIO in astar city ppp rr vehicle rrp; do
            gh release upload "${TAG}" \
              /tmp/sim_videos/arcosim_${SCENARIO}_${TAG}.mp4 \
              --clobber
          done
