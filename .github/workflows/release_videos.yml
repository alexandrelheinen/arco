name: Release Videos

on:
  release:
    types:
      - published

jobs:
  generate-videos:
    name: Generate and attach simulation MP4s
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg and virtual display
        run: sudo apt-get install -y ffmpeg xvfb libgl1

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Create output directory
        run: mkdir -p /tmp/sim_videos

      - name: Generate all simulation videos
        run: |
          bash scripts/generate_videos.sh \
            --out-dir /tmp/sim_videos \
            --duration 60

      - name: Upload videos to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for SCENARIO in astar city ppp rr vehicle rrp occ; do
            gh release upload "${TAG}" \
              /tmp/sim_videos/arcosim_${SCENARIO}.mp4 \
              --clobber
          done
