name: Simulator Smoke Tests

# Runs a short headless recording of every simulator script to ensure they
# execute without errors.  This workflow is intended to be added as a
# required status check so that bugs are caught before merging to main.

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

jobs:
  # -----------------------------------------------------------------------
  # Smoke-test all simulator scripts that are packaged into releases.
  # On pull requests this job should be set as a required status check
  # (Settings → Branches → Branch protection rules → "Require status
  # checks to pass before merging" → add "smoke-test / Smoke test simulators").
  # -----------------------------------------------------------------------
  smoke-test:
    name: Smoke test simulators
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg and virtual display
        run: sudo apt-get install -y ffmpeg xvfb libgl1

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Run simulator smoke tests
        run: bash scripts/run_smoke_tests.sh
