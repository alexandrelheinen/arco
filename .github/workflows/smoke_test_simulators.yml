name: Simulator Smoke Tests

# Runs a short headless recording of every simulator script to ensure they
# execute without errors.  This workflow is intended to be added as a
# required status check so that bugs are caught before merging to main.

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

jobs:
  # -----------------------------------------------------------------------
  # Smoke-test all simulator scripts that are packaged into releases.
  # On pull requests this job should be set as a required status check
  # (Settings → Branches → Branch protection rules → "Require status
  # checks to pass before merging" → add "smoke-test / Smoke test simulators").
  # -----------------------------------------------------------------------
  smoke-test:
    name: Smoke test simulators
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg and virtual display
        run: sudo apt-get install -y ffmpeg xvfb libgl1

      - name: Install package with pygame
        run: pip install -e ".[tools,pygame]"

      - name: Smoke test chiptune generator
        run: |
          python -m arco.tools.simulator.generate_chiptune \
            --output /tmp/smoke_chiptune.wav

      - name: Smoke test A* simulator
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.astar \
            --fps 30 \
            --record /tmp/smoke_astar.mp4 \
            --record-duration 5

      - name: Smoke test RRT* simulator
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.rrt \
            --fps 30 \
            --record /tmp/smoke_rrt.mp4 \
            --record-duration 5

      - name: Smoke test SST simulator
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.sst \
            --fps 30 \
            --record /tmp/smoke_sst.mp4 \
            --record-duration 5

      - name: Smoke test sparse neighbourhood simulator
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.sparse \
            --fps 30 \
            --record /tmp/smoke_sparse.mp4 \
            --record-duration 5

      - name: Smoke test PPP 3-D simulator
        env:
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -m arco.tools.simulator.main.ppp \
            --fps 30 \
            --record /tmp/smoke_ppp.mp4 \
            --record-duration 5
