dubins:
  cruise_speed: 1.0  # m/s
  lookahead: 0.5  # m slow down
  max_speed: 5.0  # m/s (short-burst sprint)
  max_turn_rate: 180.0  # deg/s
  max_accel: 5.0  # m/s² (safe indoor acceleration)
  max_turn_rate_dot: 3600.0  # deg/s² (very high to avoid limiting turn rate changes)
  goal_radius: 1.0  # m (> 10 timesteps at cruise speed; robust pure-pursuit stopping)
  curvature_gain: 0.0  # m  (v = cruise speed / (1 + gain * |κ|); 0 = constant speed)