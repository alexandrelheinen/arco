# Configuration for RRT* (asymptotically optimal RRT) planner.
#
# bounds           – sampling region as [[x_min, x_max], [y_min, y_max]].
# max_sample_count – maximum number of tree extension attempts.
# step_size        – maximum extension length per step (world units).
# goal_tolerance   – distance at which a node is considered to reach the goal.
# collision_check_count – intermediate points used to check a segment for
#                     collisions (higher = safer, slower).
# goal_bias        – probability of sampling the goal instead of a random state.
# obstacle_clearance – clearance radius used by the KDTree occupancy map.

# Main parameters
bounds: [[0.0, 50.0], [0.0, 50.0]]
max_sample_count: 5000
step_size: 1.0  # Grid also uses 1 m of cell size

# Those might be factors of the main ones
goal_tolerance: 2.1  # Twice the step size is OK
collision_check_count: 1  # collision_check_count ≥ step_size / obstacle_clearance
goal_bias: 0.05  # 5% is a staple value
obstacle_clearance: 2.0 # Twice the step, like the goal tolerance to ensure safety

# When true, planning stops as soon as the first node within goal_tolerance
# of the goal is found.  Set to false to run all iterations for a
# lower-cost (asymptotically optimal) solution.
early_stop: true

# Trajectory optimizer parameters.  After RRT* finds a path the optimizer
# refines it in two stages: differential evolution (global) followed by
# L-BFGS-B (local).  Spatial discretization step and cost weights are
# tuned for the 50 × 50 m RRT planning environment.
traj_spatial_step: 1.0           # Δx between trajectory points (world units)
traj_weight_time: 1.0            # weight on squared path length (time²) term
traj_weight_deviation: 0.1       # weight on squared deviation from reference
traj_weight_collision: 10.0      # weight on collision penalty
traj_deviation_bound: 5.0        # max per-axis displacement from reference (world units)
traj_stage1_population_count: 5  # DE population size multiplier
traj_stage1_max_iter: 100        # DE maximum generations (3× previous)
traj_stage2_max_iter: 100000     # L-BFGS-B maximum iterations (~50× nominal 2k)

# End-of-simulation safety check.
# Vehicle footprint: 0.5 m × 0.5 m square; safety_distance = 4 × 0.25 m = 1.0 m.
traj_safety_distance: 1.0        # minimum required clearance from any obstacle (m)
