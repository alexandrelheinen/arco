# Sparse neighbourhood race: RRT* vs SST on the same triangular-mesh environment.
#
# The world is 1280 × 720 m with 30 m wide roads (road_half_width = 15 m).
# Robot footprint: ~0.35 m radius; obstacle_clearance = 8.0 m.
#
# step_size          – maximum extension per iteration (world units).
# goal_tolerance     – distance that counts as "at goal".
# collision_check_count – intermediate collision-check points per segment.
# goal_bias          – probability of sampling the goal directly.
# obstacle_clearance – KDTree clearance radius (metres).
# rrt_max_sample_count – RRT* iteration budget.
# sst_max_sample_count – SST iteration budget.
# witness_radius       – SST witness cell half-width (δ_s).

step_size: 15.0
goal_tolerance: 20.0
collision_check_count: 3
goal_bias: 0.05
obstacle_clearance: 8.0

# RRT* tends to build larger trees; give it a higher budget.
rrt_max_sample_count: 30000

# SST is more selective; a smaller budget usually suffices.
sst_max_sample_count: 20000
witness_radius: 4.0
