# Graph generation and utilities configuration.
#
# ── Generator (tools/graph/generator.py) ──────────────────────────────────────
#
# type               – generation algorithm.
#                      ring  – irregular triangular mesh with S-shaped edges
#                              and symmetric holes.
#
# Ring parameters:
#   width             – bounding box width in metres.
#   height            – bounding box height in metres.
#   mean_edge_length  – target average edge length in metres.
#   hole_count        – number of holes to punch in the mesh.
#                       The first hole is always centred in the bounding box;
#                       the remaining holes are placed at equal angular offsets
#                       around a shared radius (random initial angle, seed-
#                       controlled), giving a rotationally symmetric pattern.
#   hole_radius       – radius of each hole in metres.
#   curvature         – S-curve aggressiveness as a fraction of edge length.
#                       0.09 produces a gentle curve (9 % of edge length).
#   seed              – integer seed for reproducible output.
#                       Set to null or omit for a fully random result.
#
# ── Random graph (used by astar_graph.py) ─────────────────────────────────────
#
#   node_count        – number of nodes to place in the square area.
#   area              – side length of the square placement area in metres.
#   connect_radius    – maximum Euclidean distance used to connect two nodes.

seed: 42

type: ring
width: 1000  # [m]
height: 1000  # [m]
mean_edge_length: 100  # [m]
hole_count: 6  # [] 1 central hole + 5 holes at equal angular offsets
hole_radius: 90  # [m]
curvature: 0.1  # [] 10 % of edge length

node_count: 30
area: 100.0
connect_radius: 28.0
