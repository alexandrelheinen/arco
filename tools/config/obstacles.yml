# Triangular neighborhood obstacle layout for the sparse dual-planner race.
#
# The world is 1280 × 720 m — the same footprint as the previous rectangular
# city layout, now replaced by a procedural triangular road network generated
# from a jittered hexagonal lattice via scipy Delaunay triangulation (same
# algorithm as the A* ring generator).  Every surviving Delaunay edge becomes
# a 30 m wide road; the interior of each triangular cell (more than
# road_half_width from any edge) is filled with KDTree obstacle points
# representing city blocks.
#
# Robot: ~0.35 m radius.  obstacle_clearance in sparse.yml = 8.0 m.
# Road width: 30 m (road_half_width = 15 m).  Mean triangle side: ~120 m.
# Start and goal are derived at runtime as the farthest pair of mesh nodes.

world_width: 1280.0
world_height: 720.0

# ── Mesh generation ─────────────────────────────────────────────────────────
# mean_edge_length  - target Delaunay triangle-side length (m)
# jitter_sigma      - std-dev of lattice jitter as fraction of mean_edge_length
# max_edge_factor   - edges longer than this × mean_edge_length are pruned
mean_edge_length: 120.0
jitter_sigma: 0.15
max_edge_factor: 1.7

# ── Road geometry ───────────────────────────────────────────────────────────
# road_half_width   - half the road width (m); obstacle points are placed
#                     outside this band around every road edge.
road_half_width: 15.0

# ── Obstacle sampling ───────────────────────────────────────────────────────
# obstacle_sampling_spacing - grid step (m) used to densely sample the
#                             interior of each triangular city block.
obstacle_sampling_spacing: 8.0

# road_dot_spacing  - spacing (m) between decorative road-marking dots drawn
#                     along every road edge centerline.
road_dot_spacing: 15.0

# ── Reproducibility ─────────────────────────────────────────────────────────
seed: 42
