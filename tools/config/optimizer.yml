# Configuration for the TrajectoryOptimizer.
#
# cruise_speed     – target traversal speed (world units / s).
# weight_time      – cost weight for the total-time-squared term.
#                    Should dominate to drive the optimizer toward shorter
#                    trajectories.
# weight_deviation – cost weight for squared deviation from the reference
#                    path at each interior waypoint.
# weight_velocity  – cost weight for speed deviation from cruise_speed.
#                    Prevents the degenerate T → 0 solution.
# weight_collision – cost weight for obstacle-penetration penalty.
# time_relaxation  – relaxation factor α for the initial duration estimate:
#                    t_i⁰ = α · L_i / cruise_speed.  Values > 1.0 give the
#                    optimizer room to tighten the time allocation.
# method           – scipy.optimize.minimize algorithm (L-BFGS-B or SLSQP).
# sample_count     – intermediate collision samples per segment.
# max_iter         – maximum number of Stage-2 solver iterations.
# ftol             – Stage-2 convergence tolerance (function value change).

cruise_speed: 1.0
weight_time: 100.0  # 1 s² deviation = 10² m²
weight_deviation: 1.0  # Reference: 1 cost unit ≈ 1 m² deviation 
weight_velocity: 0.25  # 1 m/s deviation = 0.5² m²/s²
weight_collision: 100.0  # 0.1² m² penetration = 1 cost unit
time_relaxation: 1.5
method: L-BFGS-B
sample_count: 3
max_iter: 500
ftol: 1.0e-9
