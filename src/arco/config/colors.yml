# Color palette for the ARCO visualization system.
#
# This file defines the canonical color system used by both matplotlib
# examples and pygame simulators.  Derived colors (tree alpha, path shade,
# etc.) are computed programmatically from base colors in palette.py —
# do NOT add hardcoded derived shades here.
#
# Structure
# ---------
# annotation    - default/dark_bg annotation colors (markers, text, arrows)
# obstacle      - shared obstacle fill color (all scenarios)
# methods       - per-algorithm base colors (rrt, sst, astar, dstar)
# ui            - pygame-specific UI chrome colors (HUD, background, road)

annotation:
  default: "#000000"    # [] black, used for markers, arrows, text on light bg
  dark_bg: "#F0F0F0"    # [] near-white, used for markers/text on dark backgrounds

obstacle:
  fill: "#D97070"       # [] pastel red (~HSL 0°, 55%, 70%), shared by all obstacle types
  border: null          # [] no separate border token; border uses annotation.default

methods:
  rrt:
    base: "#4477CC"     # [] blue-ish base color for RRT*
  sst:
    base: "#44AA66"     # [] green-ish base color for SST
  astar:
    base: "#7744BB"     # [] purple-ish base color for A*
  dstar:
    base: "#CC8822"     # [] yellow/ochre-ish base color for D*

# Pygame-specific UI colors (not part of the algorithm color system).
# These are not affected by the unified color system requirements.
ui:
  background: [22, 24, 30]          # [] dark asphalt background fill (RGB 0-255)
  road_dot: [65, 60, 50]            # [] faded lane-marking dots (RGB 0-255)
  road_sdf: [62, 50, 38]            # [] warm shadow near buildings in SDF heatmap (RGB 0-255)
  barrier: [200, 120, 40]           # [] amber dead-end corner barriers (RGB 0-255)
  hud_text: [220, 220, 220]         # [] primary HUD text (RGB 0-255)
  hud_dim: [130, 130, 130]          # [] secondary/dimmed HUD text (RGB 0-255)
  hud_shadow: [40, 40, 50]          # [] text drop shadow (RGB 0-255)
  hud_winner: [255, 215, 50]        # [] winner banner text (RGB 0-255)
  hud_tie: [200, 200, 80]           # [] tie banner text (RGB 0-255)
