# Grid configuration for A* obstacle examples.
#
# physical_size – physical size of the grid in metres [rows, cols].
# cell_size     – physical size of one cell in metres.
#                 The number of cells per axis is ceil(physical_size / cell_size).
#                 If physical_size is not a multiple of cell_size the grid is
#                 extended upward to the nearest multiple (logged as a warning).
# obstacle_fraction – obstacle side length as a fraction of the grid size.
physical_size: [51.0, 51.0]
cell_size: 1.0
obstacle_fraction: 0.4
