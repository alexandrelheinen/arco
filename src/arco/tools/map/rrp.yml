scenario: rrp

# RRP (revolute-revolute-prismatic) SCARA-like robot — cylindrical workspace.
#
# The arm has two planar revolute joints (identical XY kinematics to the RR
# robot) and one vertical prismatic joint that raises or lowers the whole
# arm assembly inside a cylindrical workspace.
#
#   l1  = 1.0 m  (first revolute link)
#   l2  = 0.8 m  (second revolute link)
#   r_min = |l1-l2| = 0.2 m  (inner annulus radius)
#   r_max = l1+l2   = 1.8 m  (outer annulus radius)
#   z_min = 0.0 m,  z_max = 4.0 m  (prismatic range)
#
# Configuration space: (q1, q2, z) — 3-D, planned end-to-end by RRT* / SST.
#
# Obstacle layout (two types):
#   Pillars — same small rectangular XY footprints as the 2-D RR scenario,
#             extruded to full Z height [0, z_max].  The revolute joints must
#             navigate around them in the XY plane.
#   Slabs   — wide horizontal barriers that span most of the annular workspace
#             but only occupy a fraction of the Z range, forcing the prismatic
#             joint to search for the correct height corridor.  Each slab has a
#             narrow gap so the combined (RR+P) motion is needed for any path.
#
# Scenario: arm moves from lower-rear to upper-front of the cylinder.

robot:
  l1: 1.0
  l2: 0.8
  z_min: 0.0
  z_max: 4.0

# 3-D obstacles, format: [x_min, y_min, z_min, x_max, y_max, z_max] in metres.
#
# Pillar obstacles: tall columns (full z height) — same XY footprints as
# the RR obstacles.  The arm can only pass by rotating around them.
#
# Slab obstacles: wide but short-height horizontal blockers.  Each slab spans
# most of the XY annulus but deliberately leaves a radial gap at one side so
# the arm can escape by adjusting z and maneuvering around.
environment:
  obstacles:
    # --- Pillar A: right-quadrant column ---
    - [0.55, -1.25, 0.0, 0.95, -0.95, 4.0]
    # --- Pillar B: left-quadrant column ---
    - [-0.95, 1.00, 0.0, -0.55, 1.25, 4.0]
    # --- Slab 1: vertical gate on +Y side ---
    - [0.0, 0.5, 0.0, 0.2, 3.0, 1.0]
    # --- Slab 1: vertical gate on -Y side ---
    - [0.0, -3.0, 0.0, 0.2, -0.5, 1.0]

  # IK target positions [x, y, z] for start and goal.
  start_position: [-1.5, 0.0, 0.2]
  goal_position:  [1.4,  0.0, 0.2]

  # Joint-space bounds: (q1_min, q1_max), (q2_min, q2_max), (z_min, z_max).
  bounds: [[-3.14159, 3.14159], [-3.14159, 3.14159], [0.0, 4.0]]

  # KDTree clearance (radians / metres in the blended C-space).
  obstacle_clearance: 0.40

planner:
  step_size: [0.15, 0.15, 0.10]  # [rad, rad, m]
  goal_tolerance: 0.25
  collision_check_count: 3
  goal_bias: 0.10
  rrt_max_sample_count: 40000
  sst_max_sample_count: 50000
  witness_radius: 0.08

  # Grid resolution for C-space sampling (n^3 points evaluated).
  cspace_grid_n: 80

# ---------------------------------------------------------------------------
# Simulator parameters
# ---------------------------------------------------------------------------
simulator:
  race_speed: 0.6  # [m/s] for the end-effector
