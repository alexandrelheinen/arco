scenario: rrp

# RRP (revolute-revolute-prismatic) SCARA-like robot — cylindrical workspace.
#
# The arm has two planar revolute joints (identical XY kinematics to the RR
# robot) and one vertical prismatic joint that raises or lowers the whole
# arm assembly inside a cylindrical workspace.
#
#   l1  = 1.0 m  (first revolute link)
#   l2  = 0.8 m  (second revolute link)
#   r_min = |l1-l2| = 0.2 m  (inner annulus radius)
#   r_max = l1+l2   = 1.8 m  (outer annulus radius)
#   z_min = 0.0 m,  z_max = 4.0 m  (prismatic range)
#
# Configuration space: (q1, q2, z) — 3-D, planned end-to-end by RRT* / SST.
#
# Obstacle layout (two types):
#   Pillars — same small rectangular XY footprints as the 2-D RR scenario,
#             extruded to full Z height [0, z_max].  The revolute joints must
#             navigate around them in the XY plane.
#   Slabs   — wide horizontal barriers that span most of the annular workspace
#             but only occupy a fraction of the Z range, forcing the prismatic
#             joint to search for the correct height corridor.  Each slab has a
#             narrow gap so the combined (RR+P) motion is needed for any path.
#
# Scenario: arm moves from lower-rear to upper-front of the cylinder.

robot:
  l1: 1.0  # [m] length of the first revolute link
  l2: 0.8  # [m] length of the second revolute link
  z_min: 0.0  # [m] minimum prismatic joint height
  z_max: 4.0  # [m] maximum prismatic joint height

# 3-D obstacles, format: [x_min, y_min, z_min, x_max, y_max, z_max] in metres.
#
# Pillar obstacles: tall columns (full z height) — same XY footprints as
# the RR obstacles.  The arm can only pass by rotating around them.
#
# Slab obstacles: wide but short-height horizontal blockers.  Each slab spans
# most of the XY annulus but deliberately leaves a radial gap at one side so
# the arm can escape by adjusting z and maneuvering around.
environment:
  obstacles:  # [] list of 3-D obstacles [x_min, y_min, z_min, x_max, y_max, z_max] in metres
    # --- Pillar A: right-quadrant column ---
    - [0.55, -1.25, 0.0, 0.95, -0.95, 4.0]
    # --- Pillar B: left-quadrant column ---
    - [-0.95, 1.00, 0.0, -0.55, 1.25, 4.0]
    # --- Slab 1: vertical gate on +Y side ---
    - [0.0, 0.5, 0.0, 0.2, 3.0, 1.0]
    # --- Slab 1: vertical gate on -Y side ---
    - [0.0, -3.0, 0.0, 0.2, -0.5, 1.0]

  # IK target positions [x, y, z] for start and goal.
  start_position: [-1.5, 0.0, 0.2]  # [m, m, m] end-effector Cartesian start position
  goal_position:  [1.4,  0.0, 0.2]  # [m, m, m] end-effector Cartesian goal position

  # Joint-space bounds: (q1_min, q1_max), (q2_min, q2_max), (z_min, z_max).
  bounds: [[-3.14159, 3.14159], [-3.14159, 3.14159], [0.0, 4.0]]  # [rad, rad, m] joint-space and prismatic bounds

  # KDTree clearance (radians / metres in the blended C-space).
  obstacle_clearance: 0.40  # [m] KDTree clearance in the blended C-space

planner:
  # step_size is a per-dimension vector [q1_rad, q2_rad, z_m].
  # The planners (RRT*, SST) and the TrajectoryPruner normalise ALL their
  # internal distances by dividing by step_size, so goal_tolerance and
  # witness_radius below are in *normalised* step-size units.
  #
  # obstacle_clearance is the raw Euclidean clearance radius in the (q1, q2, z)
  # C-space used by the KDTree (NOT normalised by step_size):
  #   q1/q2 axes: 0.40 / 0.15 ≈ 2.7 normalised steps
  #   z     axis: 0.40 / 0.10  = 4.0 normalised steps
  # This gives ≈ 2.7–4 steps of clearance in all dimensions — consistent
  # with the 2–3 step tolerance typical for this arm configuration.
  step_size: [0.15, 0.15, 0.10]  # [rad, rad, m] per-dimension planner step size
  goal_tolerance: 0.25  # [normalised steps] goal-reach threshold
  collision_check_count: 3  # [] number of intermediate collision checks per step
  goal_bias: 0.10  # [] probability of sampling directly toward the goal
  rrt_max_sample_count: 40000  # [] maximum number of RRT* samples
  sst_max_sample_count: 50000  # [] maximum number of SST samples
  witness_radius: 0.08  # [normalised steps] SST witness-cell deduplication radius

  # Grid resolution for C-space sampling (n^3 points evaluated).
  cspace_grid_n: 80  # [] grid resolution for C-space sampling (n^3 points evaluated)

# ---------------------------------------------------------------------------
# Simulator parameters
# ---------------------------------------------------------------------------
simulator:
  race_speed: 0.6  # [rad/s or m/s] carrot advance speed along joint-space arc
  max_ang_vel: 1.5  # [rad/s] maximum angular velocity for q1/q2 joints
  max_lin_vel: 1.0  # [m/s] maximum linear velocity for z joint
  max_ang_acc: 3.0  # [rad/s²] maximum angular acceleration for q1/q2 joints
  max_lin_acc: 2.0  # [m/s²] maximum linear acceleration for z joint
  repulsion_gain: 0.0  # [1/s] APF obstacle repulsion gain (0 = disabled)
