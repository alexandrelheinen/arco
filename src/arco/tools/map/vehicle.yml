scenario: vehicle

# Vehicle benchmark scenario (2-D) with both RRT* and SST.

# State space note
# -----------------
# The planner operates in the 2-D Cartesian projection (x m, y m).
# The full Dubins state is (x m, y m, θ rad): heading θ is tracked by
# TrackingLoop and is NOT part of the planner state space.
# step_size units match the planner state: [m, m].

planner:
  # step_size is a per-dimension vector [x_m, y_m].
  # goal_tolerance and witness_radius are in *normalised* step-size units
  # (divided by step_size inside the planner).
  # obstacle_clearance is the raw KDTree clearance in metres (NOT normalised);
  # with step_size = [1.0, 1.0] this equals obstacle_clearance/1.0
  # normalised steps (= 2 steps) in every dimension.
  bounds: [[0.0, 50.0], [0.0, 50.0]]  # [m] x and y axis bounds of the planning space
  step_size: [1.0, 1.0]  # [m, m] per-dimension planner step size
  goal_tolerance: 2.1  # [normalised steps] goal-reach threshold
  collision_check_count: 1  # [] number of intermediate collision checks per step
  goal_bias: 0.05  # [] probability of sampling directly toward the goal
  obstacle_clearance: 2.0  # [m] raw KDTree clearance (= 2 normalised steps; see note above)
  rrt_max_sample_count: 5000  # [] maximum number of RRT* samples
  sst_max_sample_count: 4000  # [] maximum number of SST samples
  witness_radius: 0.8  # [normalised steps] SST witness-cell deduplication radius
  early_stop: true  # [] stop planning when first valid path is found

world:
  random_seed: 7  # [] random seed for world generation
  wall_gap_start_fraction: 0.60  # [] fractional position along wall where gap starts
  wall_gap_end_fraction: 0.70  # [] fractional position along wall where gap ends
  wall_spacing: 1.5  # [m] spacing between parallel walls
  scatter_count: 40  # [] number of scattered obstacles placed randomly
  corner_margin: 5.0  # [m] margin from corners where obstacles are not placed

vehicle:
  dubins:
    cruise_speed: 3.0  # [m/s] nominal cruising speed
    lookahead: 4.0  # [m] lookahead distance for path tracking
    max_speed: 5.0  # [m/s] maximum vehicle speed
    max_turn_rate: 90.0  # [deg/s] maximum turn rate
    max_accel: 4.9  # [m/s²] maximum linear acceleration
    max_turn_rate_dot: 3600.0  # [deg/s²] maximum rate of change of turn rate
    goal_radius: 3.0  # [m] radius around goal considered as reached
    curvature_gain: 0.5  # [1/m] gain for curvature-based steering
