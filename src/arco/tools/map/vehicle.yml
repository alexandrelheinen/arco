scenario: vehicle

# Vehicle benchmark scenario (2-D) with both RRT* and SST.

planner:
  bounds: [[0.0, 50.0], [0.0, 50.0]]
  step_size: [1.0, 1.0]  # [m, m]
  goal_tolerance: 2.1
  collision_check_count: 1
  goal_bias: 0.05
  obstacle_clearance: 3.0
  rrt_max_sample_count: 5000
  sst_max_sample_count: 4000
  witness_radius: 0.8
  early_stop: true

world:
  random_seed: 7
  wall_gap_start_fraction: 0.45
  wall_gap_end_fraction: 0.80
  wall_spacing: 1.5
  scatter_count: 40
  corner_margin: 5.0

vehicle:
  dubins:
    cruise_speed: 3.0
    lookahead: 4.0
    max_speed: 5.0
    max_turn_rate: 90.0
    max_accel: 4.9
    max_turn_rate_dot: 3600.0
    goal_radius: 3.0
    curvature_gain: 0.5
