scenario: ppp

# PPP (triple prismatic joint) 3-D planner configuration.
#
# Workspace models an industrial high-bay warehouse bay used for truck
# loading (large gantry manipulator moves pallets / crates).
#
#   x-axis – along aisle / truck length   [0, 60 m]
#   y-axis – across bay width             [0, 20 m]
#   z-axis – height (upward, z-up)        [0,  6 m]
#
# End-effector: 0.5 m × 0.5 m square face (parallelepiped).
# Face diagonal  = sqrt(0.5² + 0.5²) ≈ 0.707 m.
# Safety clearance = 2 × face_diagonal ≈ 1.41 m  →  1.5 m.
#
# Three width-crossing barriers force vertical and lateral strategy shifts:
# - Tall barrier (x=15..17, y=0..20, z=0..2.5, reduced height for algorithm convergence)
# - Smaller barrier (x=24..26, y=0..20, z=0..2.0)
# - Split barrier (x=38..40), with two half-width sections of different
#   heights: y=0..10 up to z=3.2, and y=10..20 up to z=1.4.

environment:
  bounds: [[0.0, 60.0], [0.0, 20.0], [0.0, 6.0]]

  # Box format: [x_min, y_min, z_min, x_max, y_max, z_max]
  obstacles:
    - [15.0, 0.0, 0.0, 17.0, 20.0, 2.5]
    - [24.0, 0.0, 0.0, 26.0, 20.0, 2.0]
    - [38.0, 0.0, 0.0, 40.0, 10.0, 3.2]
    - [38.0, 10.0, 0.0, 40.0, 20.0, 1.4]
    - [5.0, 14.0, 0.0, 8.0, 19.0, 1.8]
    - [20.0, 2.0, 0.0, 23.0, 6.0, 2.2]
    - [31.0, 13.0, 0.0, 35.0, 18.0, 2.8]
    - [45.0, 4.0, 0.0, 48.0, 9.0, 1.6]
    - [54.0, 13.0, 0.0, 59.0, 14.0, 2.8]
    - [57.0, 14.0, 0.0, 58.0, 16.0, 2.8]

planner:
  step_size: 2.0
  goal_tolerance: 2.5
  collision_check_count: 3
  goal_bias: 0.07
  obstacle_clearance: 2.0
  rrt_max_sample_count: 10000
  sst_max_sample_count: 8000
  witness_radius: 0.7

# ---------------------------------------------------------------------------
# Simulation / visualisation parameters
# ---------------------------------------------------------------------------

# Speed at which the carrot target advances along the planned path (m/s).
simulator:
  race_speed: 2.0

# Maximum speed per prismatic joint axis (m/s).
  max_joint_vel: 3.0

# Maximum acceleration per prismatic joint axis (m/s^2).
# Doubled from 4.0: faster direction changes halve corner-cutting at waypoints.
# At dt = 0.05 s this allows ramp-up in ~0.375 s and limits carrot overshoot
# to well under 1 m on tight path corners.
  max_joint_acc: 8.0

# Maximum Euclidean distance the carrot may lead the robot (m).
# Reduced from 2.0: shorter leash keeps robot within ~1.2 m of carrot at all
# times, preventing path shortcuts on high-curvature sections.
  max_carrot_lag: 1.2

# Robot is considered to have reached the goal when within this distance (m).
  goal_reach_dist: 0.5

# Proportional position-to-velocity gain for the PPP robot controller (s⁻¹).
# desired_vel = proportional_gain × position_error, clipped to max_joint_vel.
# Lower values produce a slower, smoother approach with no overshoot;
# higher values are faster but may oscillate near waypoints.
  proportional_gain: 1.5
