scenario: city

# City race scenario (RRT* vs SST) on a triangular neighborhood mesh.

planner:
  # step_size [m, m]: one RRT*/SST extension per dimension. Road half-width
  # is 15 m so one step fills one road lane — right-sized for city corridors.
  step_size: [15.0, 15.0]  # [m, m] per-dimension planner step size
  # goal_tolerance: normalized units (physical / step_size). 2.0 → 30 m
  # physical. At ≤ 30 m from the goal the direct segment is short enough to
  # remain collision-free through a road corridor (≥ step_size as required).
  goal_tolerance: 2.0  # [] normalized goal-reach threshold (≥ 1.0 step)
  # 8 intermediate points → spacing ≤ 15/8 ≈ 1.9 m < clearance/2 = 4 m,
  # ensuring no obstacle (radius 8 m) slips between samples on a full step.
  collision_check_count: 8  # [] collision samples per segment
  goal_bias: 0.05  # [] probability of sampling directly toward the goal
  obstacle_clearance: 8.0  # [m] minimum clearance from obstacles
  rrt_max_sample_count: 30000  # [] maximum number of RRT* samples
  # SST needs more iterations than RRT* because witness cells prune the tree.
  # 80 000 gives SST the budget to explore the full city graph and converge.
  sst_max_sample_count: 80000  # [] maximum number of SST samples
  # witness_radius in normalized units: 0.5 → 7.5 m physical (half a road
  # half-width).  One representative node per 7.5 m radius cell keeps the SST
  # tree fine-grained enough to navigate narrow road corridors without losing
  # the path.  Using 8.0 (= 120 m physical) was a unit-confusion bug: the
  # code expects normalized units (physical / step_size) but the value was
  # set as if it were meters, creating ~16 coarse cells that starved the tree.
  witness_radius: 0.5  # [] SST witness-cell half-width in normalized units
  # Path pruning is a performance optimisation with a safety trade-off: it
  # produces a smoother but riskier path by shortcutting intermediate
  # waypoints.  To remain collision-free after pruning, all safety margins
  # must be increased.  Disabled by default.
  enable_pruning: false  # [] enable trajectory pruning (smooths path but requires larger safety margins)
  # astar_cell_size [m]: grid cell size for the A* occupancy grid.  Smaller
  # cells give A* the resolution to thread through road corridors instead of
  # being forced around the city perimeter.  The road half-width is one
  # step_size (15 m); dividing by 5 (1 centre cell + 2-σ margin on each
  # side) is a principled balance between resolution and planning time.
  astar_cell_size: 3.0  # [m] A* grid cell size (default: step_size / 5)

world:
  world_width: 1280.0  # [m] width of the world
  world_height: 720.0  # [m] height of the world
  mean_edge_length: 120.0  # [m] mean length of road network edges
  jitter_sigma: 0.15  # [] relative jitter applied to node positions
  max_edge_factor: 1.7  # [] maximum edge length multiplier relative to mean
  road_half_width: 15.0  # [m] half-width of road corridors
  obstacle_sampling_spacing: 4.0  # [m] spacing between obstacle sample points along road edges
  road_dot_spacing: 15.0  # [m] spacing between road dot markers
  seed: 42  # [] random seed for world generation
