scenario: occ

# Object-centric control — piano movers problem.
#
# A 2-D object (square or circle) is manipulated from pose A to pose B
# by N mobile actuators. The object pose (x, y, psi) is planned in a
# 3-D C-space by RRT* / SST.
#
# All lengths are in metres, masses in kg, angles in radians.

# Inpiration: https://www.pointp.fr/p/gros-oeuvre-bpe-voirie-tp/ciment-le-classic-cem-ii-a-ou-b-32-5r-sac-protect-ce-nf-sac-de-A7309875#details
body:
  type: square           # [] shape type identifier ("square", "circle"...)
  mass: 25.0             # [kg] mass of the body
  side_length: 0.46      # [m] side length of the square body (460 mm x 410 mm)
  radius: -1.0           # [m] radius used for circle type only

actuator:
  count: 3              # [] number of actuators (N)
  standoff: 0.05        # [m] standoff distance beyond bounding radius
  omega: 10.0           # [rad/s] natural frequency of the actuator loop
  zeta: 0.7             # [] damping ratio of the actuator loop
  spring_stiffness: 100.0  # [N/m] contact spring stiffness k_s

# 2-D Cartesian obstacles [x_min, y_min, x_max, y_max] in metres.
environment:
  obstacles:  # [] list of 2-D Cartesian obstacles [x_min, y_min, x_max, y_max] in metres
    - [-10.0, -15.0, -6.0, 0.0]
    - [6.0, 0.0, 10.0, 30.0]
    - [10.0, 0.0, 12.0, 6.0]
  x_range: [-50.0, 50.0]  # [m] x-axis range of the environment
  y_range: [-50.0, 50.0]  # [m] y-axis range of the environment
  start_pose: [-20.0, -20.0, 0.00]  # [m, m, rad] initial position and heading of the body
  goal_pose:  [20.0,  20.0, 0.78]   # [m, m, rad] target position and heading (~45 deg rotation)

planner:
  # step_size is a per-dimension vector [x_m, y_m, psi_rad].
  # The planners (RRT*, SST) and the TrajectoryPruner normalise ALL their
  # internal distances by dividing by step_size, so goal_tolerance and
  # witness_radius below are in *normalised* step-size units and scale
  # correctly across the mixed metre/radian axes.
  #
  # cspace_clearance is the exception: it is the raw Euclidean clearance
  # radius in the same (x, y, psi) coordinate space as the KDTree.
  # Because the KDTree uses Euclidean distance in raw units, the effective
  # clearance differs per axis:
  #   x / y  axes: cspace_clearance / step_size[0,1] normalised steps
  #   psi    axis: cspace_clearance / step_size[2]   normalised steps
  # With step_size = [1.0, 1.0, 0.1] and cspace_clearance = 1.0:
  #   x/y  : 1.0 / 1.0 = 1.0 normalised step  (≈ 1 m safety buffer)
  #   psi  : 1.0 / 0.1 = 10  normalised steps  (conservative rotation margin)
  # This larger buffer is intentional: after path pruning, the pruned
  # shortcut may graze obstacle boundaries; the extra margin ensures the
  # body stays safely clear even when the shortcut goes near a corner.
  step_size: [1.0, 1.0, 0.1]   # [m, m, rad] per-dimension planner step size
  goal_tolerance: 2.0            # [normalised steps] goal-reach threshold (~2 step-norms)
  cspace_clearance: 1.0          # [m/rad] raw C-space KDTree clearance (increased from 0.5
                                 #   to maintain safe buffer after path pruning; see note above)
  collision_check_count: 5  # [] number of intermediate collision checks per step
  goal_bias: 0.10  # [] probability of sampling directly toward the goal
  rrt_max_sample_count: 30000  # [] maximum number of RRT* samples
  sst_max_sample_count: 40000  # [] maximum number of SST samples
  witness_radius: 0.5            # [normalised steps] SST witness-cell deduplication radius
  cspace_grid_n: 120  # [] grid resolution for C-space sampling (n^3 points evaluated)
  # Path pruning is a performance optimisation with a safety trade-off: it
  # produces a smoother but riskier path by shortcutting intermediate
  # waypoints.  To remain collision-free after pruning, all safety margins
  # must be increased.  Disabled by default.
  enable_pruning: false  # [] enable trajectory pruning (smooths path but requires larger safety margins)

control:
  # Position PD — target: ωn ≈ 0.71 rad/s, ζ ≈ 0.59 → ~10 % overshoot.
  # Design: kp = ωn² · m = 0.5 · 5, kd = 2 · ζ · ωn · m = 2 · 0.59 · 0.707 · 5.
  # Peak body speed ≈ 0.28 m/s ≤ race_speed; actuators ride rigidly on the body.
  kp_pos: 2.5  # [1/s²] position proportional gain

  kd_pos: 4.2  # [1/s] position derivative gain

  # Heading PD — target: ωn ≈ 1.55 rad/s, ζ ≈ 0.85 → near-critical (< 1 % overshoot).
  # Design: kp = ωn² · I = 2.4 · 0.208, kd = 2 · ζ · ωn · I = 2 · 0.85 · 1.55 · 0.208.
  kp_psi: 0.50  # [1/s²] heading proportional gain

  kd_psi: 0.55  # [1/s] heading derivative gain

  k_rep: 5.0      # [N/m²] APF repulsion stiffness; d0 = 4 × standoff

simulator:
  dt: 0.1         # [s] simulation time step
  race_speed: 0.1 # [m/s] speed for path following
