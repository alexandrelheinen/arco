scenario: rr

# RR (2-joint revolute-revolute) robot planning configuration.
#
# Planar SCARA-style arm operating in the XY plane.
#   l1 = 1.0 m (first link)
#   l2 = 0.8 m (second link — slightly shorter)
#   Workspace annulus: [0.2, 1.8] m
#
# Scenario: arm crosses from the lower-left (-1.2, -0.8) to the upper-right
# (1.4, 0.5).  Two smaller boxes — one on each side of the workspace —
# block the natural horizontal corridor (y in [0.1, 0.6]) so the arm must
# arc through the lower half of the workspace.  Both arm links are checked
# against every obstacle, so neither link may touch any box.
#
# Planning is done in joint space (theta1, theta2).  Obstacle checking
# converts each (q1, q2) sample to Cartesian and tests both arm-link
# segments against all obstacle rectangles to build the C-space map.

robot:
  l1: 1.0  # [m] length of the first robot link
  l2: 0.8  # [m] length of the second robot link

# Rectangular obstacles [[x_min, y_min, x_max, y_max], ...] in metres.
# Both arm links are checked against every obstacle.
environment:
  obstacles:  # [] list of rectangular obstacles [x_min, y_min, x_max, y_max] in metres
    - [0.6, -1.2, 0.9, -1.0]
    - [-0.9, 1.0, -0.6, 1.2]

# End-effector Cartesian start / goal used for IK to get joint config.
  start_position: [0.0, -1.6]  # [m, m] end-effector Cartesian start position
  goal_position: [1.5, 0.5]  # [m, m] end-effector Cartesian goal position

# Joint-space bounds [theta_min, theta_max] in radians for each joint.
  bounds: [[-3.2, 3.2], [-3.2, 3.2]]  # [rad] joint-space bounds, slightly expanded from [-pi, pi]

# KDTree clearance in radians — buffer around sampled collision configs.
  obstacle_clearance: 0.40  # [rad] KDTree clearance around sampled collision configurations

planner:
  step_size: [0.20, 0.12]  # [rad] per-joint planner step size
  goal_tolerance: 0.30  # [rad] joint-space distance threshold to consider goal reached
  collision_check_count: 5  # [] number of intermediate collision checks per step
  goal_bias: 0.10  # [] probability of sampling directly toward the goal
  rrt_max_sample_count: 30000  # [] maximum number of RRT* samples
  sst_max_sample_count: 40000  # [] maximum number of SST samples
  witness_radius: 0.05  # [rad] SST witness cell radius (less than half the step size)
  # Path pruning is a performance optimisation with a safety trade-off: it
  # produces a smoother but riskier path by shortcutting intermediate
  # waypoints.  To remain collision-free after pruning, all safety margins
  # must be increased.  Disabled by default.
  enable_pruning: false  # [] enable trajectory pruning (smooths path but requires larger safety margins)

# ---------------------------------------------------------------------------
# Simulator parameters
# ---------------------------------------------------------------------------

# Speed at which the parametric progress variable advances along the path.
simulator:
  race_speed: 0.8  # [] parametric progress speed along the planned path
